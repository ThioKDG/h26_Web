<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/main.css">
    <script src="./script/main.js" defer></script>
    <title>🌈개쩌는계산기🌈</title>
</head>
<body>
    <div class="calcBody">
        <section class="displaySection">
            <div id="mode-status">BASIC</div>
            <p id="display">0</p>
        </section>

        <div class="mode-control" style="text-align: center; margin: 10px 0;">
            <button class="pro-btn">PRO</button>
        </div>

        <section class="prog-buttons" style="display: none;">
            <p class="buttons prog-opt">BIN</p>
            <p class="buttons prog-opt">OCT</p>
            <p class="buttons prog-opt">HEX</p>
        </section>

        <section class="buttonSection">
            <p class="buttons">7</p>
            <p class="buttons">8</p>
            <p class="buttons">9</p>
            <p class="buttons">/</p>

            <p class="buttons">4</p>
            <p class="buttons">5</p>
            <p class="buttons">6</p>
            <p class="buttons">*</p>

            <p class="buttons">1</p>
            <p class="buttons">2</p>
            <p class="buttons">3</p>
            <p class="buttons">-</p>

            <p class="buttons">0</p>
            <p class="buttons">.</p>
            <p class="buttons">=</p> 
            <p class="buttons">+</p>
            
            <p class="buttons" style="grid-column: span 4; background-color: #ffcccc;">AC</p>
        </section>
    </div>
</body>
</html>

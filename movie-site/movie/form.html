<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰작성</title>
</head>
<body>
    <main>
        <form action="">
            <fieldset>
                <legend>리뷰 작성 폼</legend>

                    <label for="movieName">영화제목</label>

                        <option value="1">나니아 연대기 : 사자 마녀 그리고 옷장</option>
                        <option value="2">코코</option>
                    </select>
                </div>
                <div>
                    <label for="reviewName">리뷰 제목</label>
                    <input type="text" name="reviewName" placeholder="리뷰제목">
                </div>
                <div>
                    <label for="movieName">리뷰</label>
                    <textarea type="textarea" name="movieName" placeholder="리뷰를 작성해주세요."></textarea>
                </div>
                <button>제출</button>
            </fieldset>            
        </form>

</body>
</html>
